<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">

<div class="logo-icon">
🧁
</div>

<div>
<h2>BakeNBrew</h2>
<p>Pastry and Drinks Costing System</p>
</div>

</div>

<nav>

<a href="home.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="ingredients.html">
<i class="fa-solid fa-wheat-awn"></i>
Ingredients
</a>

<a href="packaging.html" class="active">
<i class="fa-solid fa-box"></i>
Packaging
</a>

<a href="recipes.html">
<i class="fa-solid fa-cake-candles"></i>
Recipes
</a>

<a href="recipe-list.html">
    <i class="fa-solid fa-book"></i>
    Saved Recipes
</a>

<a href="calculations.html">
<i class="fa-solid fa-calculator"></i>
Calculations
</a>

<a href="products.html">
<i class="fa-solid fa-cookie-bite"></i>
Made Goods
</a>

</nav>

</aside>

<!-- MAIN -->

<main class="main-content">

<header class="page-header">

<div>
<h1>📦 Packaging</h1>
<p>Manage boxes, pouches, ribbons and other packaging costs.</p>
</div>

<button class="primary-btn" id="openPackagingModal">
+ Add Packaging
</button>

</header>

<!-- SEARCH -->

<section class="search-section">

<input
type="text"
id="packagingSearch"
placeholder="Search packaging..."
class="search-input">

</section>

<!-- TABLE -->

<section class="dashboard-section">

<div class="table-wrapper">

<table>

<thead>

<tr>
<th>Name</th>
<th>Quantity</th>
<th>Unit</th>
<th>Total Cost</th>
<th>Cost / Piece</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="packagingTableBody">

<tr>

<td colspan="6">

<div class="empty-state">

📦

<p>No packaging items yet.</p>

</div>

</td>

</tr>

</tbody>

</table>

</div>

</section>

<!-- MOBILE CARDS -->

<section id="packagingCards" class="mobile-cards">

</section>

</main>

<!-- MODAL -->

<div class="modal" id="packagingModal">

<div class="modal-content">

<div class="modal-header">

<h2>Add Packaging</h2>

<button class="close-btn" id="closePackagingModal">
×
</button>

</div>

<form id="packagingForm">

<div class="form-group">

<label>Packaging Name</label>

<input
type="text"
id="packagingName"
required>

</div>

<div class="form-group">

<label>Quantity Purchased</label>

<input
type="number"
id="packagingQuantity"
required>

</div>

<div class="form-group">

<label>Unit</label>

<select id="packagingUnit">

<option value="pcs">pcs</option>

</select>

</div>

<div class="form-group">

<label>Total Cost (₱)</label>

<input
type="number"
step="0.01"
id="packagingCost"
required>

</div>

<button type="submit" class="primary-btn save-btn">
Save Packaging
</button>

</form>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/packaging.js"></script>

</body>
</html>
