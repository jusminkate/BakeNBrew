<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BakeNBrew Cost | Ingredients</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">

<div class="logo-icon">
🧁
</div>

<div>
<h2>BakeNBrew</h2>
<p>Pastry and Drinks Costing System</p>
</div>

</div>

<nav>

<a href="home.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="ingredients.html" class="active">
<i class="fa-solid fa-wheat-awn"></i>
Ingredients
</a>

<a href="packaging.html">
<i class="fa-solid fa-box"></i>
Packaging
</a>

<a href="recipes.html">
<i class="fa-solid fa-cake-candles"></i>
Recipes
</a>

<a href="recipe-list.html">
    <i class="fa-solid fa-book"></i>
    Saved Recipes
</a>

<a href="calculations.html">
<i class="fa-solid fa-calculator"></i>
Calculations
</a>

<a href="products.html">
<i class="fa-solid fa-cookie-bite"></i>
Made Goods
</a>

</nav>

</aside>

<!-- MAIN -->

<main class="main-content">

<header class="page-header">

<div>
<h1>🥣 Ingredients</h1>
<p>Manage all baking ingredients and costs.</p>
</div>

<button class="primary-btn" id="openModalBtn">
+ Add Ingredient
</button>

</header>

<!-- SEARCH -->

<section class="search-section">

<input
type="text"
id="ingredientSearch"
placeholder="Search ingredient..."
class="search-input">

</section>

<!-- TABLE -->

<section class="dashboard-section">

<div class="table-wrapper">

<table>

<thead>

<tr>
<th>Name</th>
<th>Quantity</th>
<th>Unit</th>
<th>Cost</th>
<th>Cost / Unit</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="ingredientTableBody">

<tr>

<td colspan="6">

<div class="empty-state">

🥣

<p>No ingredients added yet.</p>

</div>

</td>

</tr>

</tbody>

</table>

</div>

</section>

<!-- MOBILE CARDS -->

<section id="ingredientCards" class="mobile-cards">

</section>

</main>

<!-- MODAL -->

<div class="modal" id="ingredientModal">

<div class="modal-content">

<div class="modal-header">

<h2>Add Ingredient</h2>

<button class="close-btn" id="closeModalBtn">
×
</button>

</div>

<form id="ingredientForm">

<div class="form-group">

<label>Ingredient Name</label>

<input
type="text"
id="ingredientName"
required>

</div>



<div class="form-group">

<label>Purchase Quantity</label>

<input
type="number"
id="ingredientQuantity"
required>

</div>

<div class="form-group">

<label>Unit</label>

<select id="ingredientUnit">

<option value="g">g</option>
<option value="ml">ml</option>
<option value="pcs">pcs</option>

</select>

</div>

<div class="form-group">

<label>Purchase Cost (₱)</label>

<input
type="number"
step="0.01"
id="ingredientCost"
required>

</div>

<button type="submit" class="primary-btn save-btn">
Save Ingredient
</button>

</form>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/ingredients.js"></script>

</body>
</html>
